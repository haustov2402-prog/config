name: Update VPN Configs

on:
  schedule:
    # Запуск каждый час
    - cron: '0 * * * *'
  workflow_dispatch:  # Ручной запуск

# Таймаут 35 минут
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  update-configs:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        pip install singbox2proxy requests python-dotenv aiohttp dnspython
    
    - name: Run aggregator
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPO_OWNER: ${{ github.repository_owner }}
        GITHUB_REPO_NAME: ${{ github.event.repository.name }}
      run: |
        echo "Запуск агрегатора..."
        python main.py
    
    - name: Check if file was generated
      run: |
        if [ -f "top100_mobile_aggregated.txt" ]; then
          echo "✓ Файл top100_mobile_aggregated.txt сгенерирован"
          wc -l top100_mobile_aggregated.txt
        else
          echo "✗ Файл не найден!"
          exit 1
        fi
    
    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Добавляем сгенерированные файлы
        git add top100_mobile_aggregated.txt
        git add raw/
        git add README.md
        
        # Проверяем есть ли изменения
        if git diff --staged --quiet; then
          echo "Нет изменений для коммита"
        else
          git commit -m "Auto-update: refresh top100 VPN configs [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
          echo "✓ Изменения зафиксированы"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
